<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>자리지킴이 — 오프라인</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background-color: #f4f6fd;
        color: #1b1e2e;
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
      }
      h1 {
        font-size: 1.1rem;
        margin: 4px 0 0;
      }
      p {
        margin: 0;
        color: #6b7280;
        font-size: 0.9rem;
        max-width: 320px;
      }
      button {
        margin-top: 12px;
        border: none;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background-color: #7c3aed;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="자리지킴이 로고" />
    <h1>인터넷 연결이 끊겼어요</h1>
    <p>아직 이 화면을 오프라인에 저장해두지 못했어요. 네트워크가 연결되면 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </body>
</html>
